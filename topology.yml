name: blue-team

hosts:
  - name: attacker
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: m1.small

  - name: server
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: m1.small

  - name: client
    base_box:
      image: ubuntu-noble-x86_64
      man_user: ubuntu
    flavor: m1.small

routers:
  - name: router
    base_box:
      image: debian-12-x86_64
      man_user: debian
    flavor: m1.small

networks:
  - name: target-switch
    cidr: 10.1.26.0/24
    accessible_by_user: false

  - name: client-switch
    cidr: 10.1.27.0/24
    accessible_by_user: true

net_mappings:
  - host: attacker
    network: target-switch
    ip: 10.1.26.23

  - host: server
    network: target-switch
    ip: 10.1.26.9

  - host: client
    network: client-switch
    ip: 10.1.27.4

router_mappings:
  - router: router
    network: target-switch
    ip: 10.1.26.1

  - router: router
    network: client-switch
    ip: 10.1.27.1

groups: []
